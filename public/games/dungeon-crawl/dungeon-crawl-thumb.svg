<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="cavernGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#050308"/>
      <stop offset="55%" stop-color="#14100c"/>
      <stop offset="100%" stop-color="#241a10"/>
    </linearGradient>
    <radialGradient id="torchGlowL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffc94d" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#ff7a1a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff7a1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="stairsGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb84d" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffb84d" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" fill="url(#cavernGrad)"/>

  <!-- Stone floor grid -->
  <g fill="#2b241e">
    <rect x="0" y="330" width="512" height="182"/>
  </g>
  <g fill="#272019">
    <rect x="0" y="330" width="64" height="60"/>
    <rect x="128" y="330" width="64" height="60"/>
    <rect x="256" y="330" width="64" height="60"/>
    <rect x="384" y="330" width="64" height="60"/>
    <rect x="64" y="390" width="64" height="60"/>
    <rect x="192" y="390" width="64" height="60"/>
    <rect x="320" y="390" width="64" height="60"/>
    <rect x="448" y="390" width="64" height="60"/>
    <rect x="0" y="450" width="64" height="62"/>
    <rect x="128" y="450" width="64" height="62"/>
    <rect x="256" y="450" width="64" height="62"/>
    <rect x="384" y="450" width="64" height="62"/>
  </g>

  <!-- Back wall bricks -->
  <g fill="#382c23">
    <rect x="0" y="180" width="512" height="150"/>
  </g>
  <g stroke="#15100c" stroke-width="4">
    <line x1="0" y1="218" x2="512" y2="218"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="294" x2="512" y2="294"/>
    <line x1="80" y1="180" x2="80" y2="218"/>
    <line x1="200" y1="218" x2="200" y2="256"/>
    <line x1="330" y1="180" x2="330" y2="218"/>
    <line x1="430" y1="256" x2="430" y2="294"/>
    <line x1="120" y1="256" x2="120" y2="294"/>
  </g>

  <!-- Dark archway with descending stairs -->
  <rect x="196" y="196" width="120" height="134" fill="#050308"/>
  <rect x="188" y="188" width="136" height="10" fill="#4a3c30"/>
  <rect x="188" y="188" width="10" height="142" fill="#4a3c30"/>
  <rect x="314" y="188" width="10" height="142" fill="#4a3c30"/>
  <ellipse cx="256" cy="330" rx="80" ry="26" fill="url(#stairsGlow)"/>
  <g>
    <rect x="212" y="250" width="88" height="14" fill="#6e5636"/>
    <rect x="222" y="272" width="68" height="14" fill="#54401f"/>
    <rect x="232" y="294" width="48" height="14" fill="#3a2c14"/>
    <rect x="242" y="316" width="28" height="12" fill="#241a08"/>
  </g>

  <!-- Wall torches -->
  <circle cx="120" cy="210" r="70" fill="url(#torchGlowL)"/>
  <circle cx="392" cy="210" r="70" fill="url(#torchGlowL)"/>
  <g>
    <rect x="114" y="216" width="12" height="26" fill="#241a10"/>
    <rect x="110" y="196" width="20" height="20" fill="#ff7a1a"/>
    <rect x="115" y="200" width="10" height="12" fill="#ffc94d"/>
    <rect x="386" y="216" width="12" height="26" fill="#241a10"/>
    <rect x="382" y="196" width="20" height="20" fill="#ff7a1a"/>
    <rect x="387" y="200" width="10" height="12" fill="#ffc94d"/>
  </g>

  <!-- Gold scatter -->
  <g fill="#ffd24a">
    <rect x="150" y="420" width="12" height="12"/>
    <rect x="170" y="436" width="10" height="10"/>
    <rect x="352" y="404" width="12" height="12"/>
  </g>

  <!-- Skeleton (right) -->
  <g transform="translate(360, 340)">
    <rect x="0" y="0" width="26" height="20" fill="#d8d2c2"/>
    <rect x="4" y="5" width="7" height="7" fill="#2b2118"/>
    <rect x="15" y="5" width="7" height="7" fill="#2b2118"/>
    <rect x="-4" y="24" width="34" height="8" fill="#d8d2c2"/>
    <rect x="-1" y="36" width="28" height="8" fill="#d8d2c2"/>
    <rect x="2" y="48" width="22" height="8" fill="#d8d2c2"/>
  </g>

  <!-- Slime (left) -->
  <g transform="translate(96, 400)">
    <rect x="4" y="0" width="40" height="10" fill="#5dbb46"/>
    <rect x="0" y="10" width="48" height="26" fill="#5dbb46"/>
    <rect x="10" y="16" width="8" height="8" fill="#1e3a14"/>
    <rect x="28" y="16" width="8" height="8" fill="#1e3a14"/>
  </g>

  <!-- Hero with sword and torchlight -->
  <circle cx="256" cy="420" r="96" fill="url(#torchGlowL)"/>
  <g transform="translate(232, 380)">
    <!-- hood -->
    <rect x="6" y="0" width="36" height="10" fill="#5c2c14"/>
    <!-- face -->
    <rect x="10" y="10" width="28" height="18" fill="#e8b98a"/>
    <rect x="16" y="16" width="5" height="5" fill="#1a0e06"/>
    <rect x="27" y="16" width="5" height="5" fill="#1a0e06"/>
    <!-- cloak -->
    <rect x="2" y="28" width="44" height="40" fill="#7a3b1e"/>
    <rect x="2" y="50" width="44" height="7" fill="#3d1d0c"/>
    <!-- boots -->
    <rect x="8" y="68" width="12" height="10" fill="#3d1d0c"/>
    <rect x="28" y="68" width="12" height="10" fill="#3d1d0c"/>
    <!-- sword raised -->
    <rect x="52" y="-26" width="8" height="52" fill="#cfd6e0"/>
    <rect x="46" y="26" width="20" height="8" fill="#8a6a1e"/>
    <rect x="54" y="34" width="4" height="12" fill="#6b4a2a"/>
  </g>

  <!-- Title banner -->
  <rect x="40" y="52" width="432" height="84" rx="8" fill="#0a0705" opacity="0.88" stroke="#a56a2b" stroke-width="3"/>
  <text x="256" y="106" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="bold" fill="#ff7a1a" text-anchor="middle">DUNGEON CRAWL</text>
  <text x="256" y="128" font-family="Arial, sans-serif" font-size="14" fill="#ffd24a" text-anchor="middle" letter-spacing="4">THE EMBER DEPTHS</text>
</svg>
