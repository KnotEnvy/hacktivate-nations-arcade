<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a0033"/>
      <stop offset="60%" stop-color="#330044"/>
      <stop offset="100%" stop-color="#5a0066"/>
    </linearGradient>
    <linearGradient id="roadGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="60%" stop-color="#FF1493"/>
      <stop offset="100%" stop-color="#330044" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="playerCarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#E0E0E0"/>
      <stop offset="100%" stop-color="#888888"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#skyGrad)"/>

  <!-- Synthwave sun -->
  <circle cx="256" cy="180" r="90" fill="url(#sunGrad)"/>
  <g stroke="#1a0033" stroke-width="6">
    <line x1="166" y1="200" x2="346" y2="200"/>
    <line x1="166" y1="215" x2="346" y2="215"/>
    <line x1="166" y1="230" x2="346" y2="230"/>
    <line x1="166" y1="245" x2="346" y2="245"/>
  </g>

  <!-- Distant grid horizon -->
  <g stroke="#FF1493" stroke-width="1.5" opacity="0.7">
    <line x1="0" y1="280" x2="512" y2="280"/>
    <line x1="0" y1="300" x2="512" y2="300"/>
  </g>

  <!-- Road (perspective trapezoid) -->
  <polygon points="180,280 332,280 460,512 52,512" fill="url(#roadGrad)"/>

  <!-- Road edge glow -->
  <line x1="180" y1="280" x2="52" y2="512" stroke="#FF1493" stroke-width="3"/>
  <line x1="332" y1="280" x2="460" y2="512" stroke="#FF1493" stroke-width="3"/>

  <!-- Lane markings (perspective) -->
  <g stroke="#00FFFF" stroke-width="3" stroke-linecap="round">
    <line x1="231" y1="290" x2="180" y2="350"/>
    <line x1="178" y1="380" x2="120" y2="455"/>
    <line x1="281" y1="290" x2="332" y2="350"/>
    <line x1="334" y1="380" x2="392" y2="455"/>
  </g>

  <!-- Center dashed line -->
  <g stroke="#FFFF00" stroke-width="3" stroke-dasharray="14,12">
    <line x1="256" y1="285" x2="256" y2="510"/>
  </g>

  <!-- Enemy car (top, red) -->
  <g transform="translate(220, 320)">
    <rect x="0" y="0" width="42" height="58" rx="6" fill="#E53935"/>
    <rect x="6" y="10" width="30" height="20" rx="3" fill="#1a1a2e"/>
    <rect x="0" y="48" width="6" height="8" fill="#FFEB3B"/>
    <rect x="36" y="48" width="6" height="8" fill="#FFEB3B"/>
  </g>

  <!-- Player spy car (bottom, white with accent) -->
  <g transform="translate(220, 410)">
    <rect x="0" y="0" width="60" height="80" rx="10" fill="url(#playerCarGrad)"/>
    <rect x="8" y="14" width="44" height="26" rx="4" fill="#0a0a14"/>
    <rect x="6" y="50" width="48" height="6" fill="#1a1a2e"/>
    <!-- machine gun barrels -->
    <rect x="14" y="-8" width="6" height="14" fill="#444"/>
    <rect x="40" y="-8" width="6" height="14" fill="#444"/>
    <!-- headlights -->
    <rect x="6" y="74" width="10" height="6" fill="#FFFFFF"/>
    <rect x="44" y="74" width="10" height="6" fill="#FFFFFF"/>
    <!-- racing stripes -->
    <line x1="22" y1="2" x2="22" y2="78" stroke="#FF1493" stroke-width="2"/>
    <line x1="38" y1="2" x2="38" y2="78" stroke="#FF1493" stroke-width="2"/>
  </g>

  <!-- Muzzle flash hint -->
  <g transform="translate(234, 398)" opacity="0.9">
    <circle cx="0" cy="0" r="6" fill="#FFFF00"/>
    <circle cx="32" cy="0" r="6" fill="#FFFF00"/>
  </g>

  <!-- Title banner -->
  <rect x="40" y="60" width="432" height="76" rx="8" fill="#0a0a14" opacity="0.85" stroke="#FF1493" stroke-width="2"/>
  <text x="256" y="112" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#FF1493" text-anchor="middle">SPEED RACER</text>
  <text x="256" y="132" font-family="Arial, sans-serif" font-size="13" fill="#00FFFF" text-anchor="middle" letter-spacing="3">VEHICULAR COMBAT</text>
</svg>
